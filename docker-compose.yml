services:
  ebimport-splash:
    image: ebimport-splash:latest
    container_name: ebimport-splash
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_TIMESTAMP: "${BUILD_TIMESTAMP:-}"
    restart: unless-stopped
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
